<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Animation</title>
<style>
    body {
        margin: 0;
        padding: 2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f2f2f2;
    }

    .loader {
        width: 200px;
        height: 200px;
        position: relative;
    }

    .ball {
        width: 90px;
        height: 90px;
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        animation: bounce 1s infinite alternate;
        background: repeating-linear-gradient(45deg, #ff6600, #ff6600 5px, #ffffff 5px, #ffffff 10px);
        border-radius: 50%;
    }

    @keyframes bounce {
        0% {
            bottom: 0;
        }
        100% {
            bottom: 150px;
        }
    }
</style>
</head>
<body>
<div class="loader">
    <div class="ball"></div>
</div>
</body>
</html>
