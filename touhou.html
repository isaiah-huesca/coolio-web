<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gensokyo JS: Midnight Phantasm</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@1,600&family=Share+Tech+Mono&display=swap');

        body { background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
        #game-container { position: relative; border: 2px solid #442244; box-shadow: 0 0 50px #331133; }
        canvas { display: block; background: #000; }

        /* UI Styling */
        #hud { position: absolute; top: 0; right: -240px; width: 220px; height: 100%; background: linear-gradient(180deg, #1a001a 0%, #000 100%); border-left: 2px solid #442244; padding: 20px; box-sizing: border-box; }
        .stat-group { margin-bottom: 25px; }
        .label { color: #8a668a; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #fff; font-size: 22px; text-shadow: 0 0 10px #ff00ff66; }
        .bar { width: 100%; height: 6px; background: #202; border: 1px solid #404; margin-top: 5px; position: relative; }
        #boss-hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ffaa00); transition: width 0.3s; }

        /* Spell Card Banner */
        #spell-banner { position: absolute; top: 80px; left: 0; width: 100%; text-align: right; padding-right: 20px; font-family: 'Crimson Text', serif; font-size: 24px; font-style: italic; color: #ff0055; text-shadow: 2px 2px #000; opacity: 0; transition: opacity 1s; pointer-events: none; }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        h1 { font-family: 'Crimson Text', serif; font-size: 48px; margin: 0; color: #ff0055; text-shadow: 0 0 20px #ff0055; }
        button { background: none; border: 1px solid #ff0055; color: #ff0055; padding: 10px 30px; font-family: inherit; font-size: 20px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #ff0055; color: #000; box-shadow: 0 0 20px #ff0055; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="500" height="700"></canvas>
    <div id="spell-banner">Spell Card: "Thousand Cherry Blossoms"</div>

    <div id="hud">
        <div class="stat-group">
            <div class="label">High Score</div>
            <div class="value">000,999,999</div>
        </div>
        <div class="stat-group">
            <div class="label">Score</div>
            <div id="score" class="value">0</div>
        </div>
        <div class="stat-group">
            <div class="label">Lives</div>
            <div id="lives" class="value" style="color: #ff69b4;">❤❤❤</div>
        </div>
        <div class="stat-group">
            <div class="label">Graze</div>
            <div id="graze" class="value" style="color: #00ffff;">0</div>
        </div>
        <div class="stat-group">
            <div class="label">Power</div>
            <div id="power" class="value" style="color: #ffaa00;">0.00 / 4.00</div>
        </div>
        <div id="boss-ui" class="hidden">
            <div class="label">Boss Vitality</div>
            <div class="bar"><div id="boss-hp-fill"></div></div>
        </div>
    </div>

    <div id="overlay">
        <h1>MIDNIGHT PHANTASM</h1>
        <p style="color: #888">Arrows to Move | Z to Shoot | Shift for Focus</p>
        <button onclick="initGame()">Enter the Dream</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME OBJECTS ---
let state = 'MENU';
let frames = 0;
let score = 0;
let graze = 0;
let lives = 3;
let power = 0;

const player = { x: 250, y: 600, r: 2, speed: 5, invuln: 0, bullets: [] };
const boss = { x: 250, y: -100, hp: 5000, max: 5000, phase: 0, active: false, t: 0 };
const enemyBullets = [];
const items = [];
const particles = [];
const stars = Array(50).fill(0).map(() => ({ x: Math.random()*500, y: Math.random()*700, s: Math.random()*2+1 }));

const keys = {};
window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

// --- UTILS ---
function spawnBullet(x, y, angle, speed, color, radius=4) {
    enemyBullets.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, color, r: radius, grazed: false });
}

function createExplosion(x, y, color, count=10) {
    for(let i=0; i<count; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 30, color });
    }
}

// --- LOGIC ---
function update() {
    if (state !== 'PLAYING') return;
    frames++;
    if (player.invuln > 0) player.invuln--;

    // 1. Background Scroll
    stars.forEach(s => {
        s.y += s.s;
        if (s.y > 700) { s.y = 0; s.x = Math.random()*500; }
    });

    // 2. Player Movement (Touhou Focus Mechanic)
    const isFocus = keys['shift'];
    const curSpeed = isFocus ? player.speed / 2.5 : player.speed;
    if (keys['arrowup'] && player.y > 20) player.y -= curSpeed;
    if (keys['arrowdown'] && player.y < 680) player.y += curSpeed;
    if (keys['arrowleft'] && player.x > 20) player.x -= curSpeed;
    if (keys['arrowright'] && player.x < 480) player.x += curSpeed;

    // 3. Shooting
    if (keys['z'] && frames % 4 === 0) {
        player.bullets.push({ x: player.x, y: player.y - 15, vx: 0 });
        if (power >= 1) {
            player.bullets.push({ x: player.x - 10, y: player.y, vx: -0.5 });
            player.bullets.push({ x: player.x + 10, y: player.y, vx: 0.5 });
        }
    }

    // 4. Boss Sequence
    if (frames === 200) {
        boss.active = true;
        document.getElementById('boss-ui').classList.remove('hidden');
    }

    if (boss.active) {
        if (boss.y < 150) boss.y += 2;
        boss.t++;
        boss.x = 250 + Math.sin(boss.t * 0.01) * 100;

        // Phase Transitions
        if (boss.hp > 2500) {
            // Phase 1: Petal Rain
            if (frames % 5 === 0) {
                let angle = Math.sin(frames * 0.02) * Math.PI * 2;
                spawnBullet(boss.x, boss.y, angle, 3, '#ff00aa');
                spawnBullet(boss.x, boss.y, angle + Math.PI, 3, '#ff00aa');
            }
        } else {
            // Phase 2: Spell Card "Neon Web"
            if (boss.phase === 0) {
                boss.phase = 1;
                document.getElementById('spell-banner').style.opacity = 1;
                enemyBullets.length = 0; // Clear screen for spell
            }
            if (frames % 15 === 0) {
                for(let i=0; i<12; i++) {
                    spawnBullet(boss.x, boss.y, (i*Math.PI*2/12) + (frames*0.05), 2, '#00ffff', 5);
                }
            }
        }
    }

    // 5. Collision & Graze
    enemyBullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;

        const dist = Math.hypot(b.x - player.x, b.y - player.y);

        // Graze logic (Distance < 20 but > player radius)
        if (!b.grazed && dist < 25 && dist > player.r + 2) {
            b.grazed = true;
            graze++;
            score += 100;
        }

        // Hit logic
        if (player.invuln <= 0 && dist < player.r + b.r/2) {
            lives--;
            player.invuln = 120;
            enemyBullets.length = 0;
            createExplosion(player.x, player.y, '#fff', 30);
            if (lives < 0) state = 'MENU';
        }

        if (b.y < -50 || b.y > 750 || b.x < -50 || b.x > 550) enemyBullets.splice(i, 1);
    });

    player.bullets.forEach((b, i) => {
        b.y -= 12; b.x += b.vx;
        if (boss.active && Math.hypot(b.x - boss.x, b.y - boss.y) < 40) {
            boss.hp -= 5;
            score += 10;
            player.bullets.splice(i, 1);
        }
        if (b.y < -20) player.bullets.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });

    updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = score.toLocaleString().padStart(9, '0');
    document.getElementById('lives').innerText = "❤".repeat(Math.max(0, lives));
    document.getElementById('graze').innerText = graze;
    document.getElementById('power').innerText = power.toFixed(2) + " / 4.00";
    document.getElementById('boss-hp-fill').style.width = (boss.hp/boss.max*100) + "%";
}

function draw() {
    // Clear with slight trail effect
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0, 0, 500, 700);

    // Stars
    ctx.fillStyle = '#fff';
    stars.forEach(s => ctx.fillRect(s.x, s.y, s.s/2, s.s/2));

    // Boss Glow
    if (boss.active) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = boss.hp > 2500 ? '#ff00aa' : '#00ffff';
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(boss.x, boss.y, 30, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Player
    if (player.invuln % 4 < 2) {
        // Character Body
        ctx.fillStyle = '#f0f';
        ctx.fillRect(player.x-12, player.y-18, 24, 36);

        // Focus Hitbox Dot (Stylized)
        if (keys['shift']) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(player.x, player.y, 4, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // Bullets (Neon Style)
    ctx.lineWidth = 2;
    enemyBullets.forEach(b => {
        ctx.shadowBlur = 8;
        ctx.shadowColor = b.color;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = b.color;
        ctx.stroke();
    });
    ctx.shadowBlur = 0;

    // Player Shots
    ctx.fillStyle = '#0ff';
    player.bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 15));

    particles.forEach(p => {
        ctx.globalAlpha = p.life/30;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;

    update();
    requestAnimationFrame(draw);
}

function initGame() {
    score = 0; lives = 3; frames = 0; graze = 0;
    boss.hp = boss.max; boss.active = false; boss.y = -100; boss.phase = 0;
    player.x = 250; player.y = 600;
    enemyBullets.length = 0;
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('spell-banner').style.opacity = 0;
    state = 'PLAYING';
}

draw();
</script>
</body>
</html>
