<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danmaku JS: Scarlet Night</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-wrapper { position: relative; border: 4px solid #333; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        canvas { background: linear-gradient(to bottom, #000428, #004e92); display: block; }

        /* UI Overlay */
        #ui { position: absolute; top: 0; right: -220px; width: 200px; padding: 10px; background: #111; border: 2px solid #333; height: 100%; }
        .stat-label { color: #aaa; font-size: 12px; text-transform: uppercase; margin-top: 15px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #ff3e3e; }
        .hp-bar { width: 100%; height: 10px; background: #300; border: 1px solid #ff4444; margin-top: 5px; }
        #hp-inner { width: 100%; height: 100%; background: #ff4444; transition: width 0.1s; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column;
                   justify-content: center; align-items: center; background: rgba(0,0,0,0.7); z-index: 10; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #ff3e3e; border: none; color: white; border-radius: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="450" height="600"></canvas>

    <div id="ui">
        <div class="stat-label">Score</div>
        <div id="score" class="stat-value">000,000,000</div>

        <div class="stat-label">Lives</div>
        <div id="lives" class="stat-value" style="color: #ff69b4;">♥♥♥</div>

        <div class="stat-label">Bombs (X Key)</div>
        <div id="bombs" class="stat-value" style="color: #55ff55;">★★★</div>

        <div class="stat-label">Boss Health</div>
        <div class="hp-bar"><div id="hp-inner"></div></div>
    </div>

    <div id="overlay">
        <h1 id="msg-title">DANMAKU JS</h1>
        <p id="msg-sub">Z to Shoot | X to Bomb | Shift to Focus</p>
        <button onclick="startGame()">START GAME</button>
    </div>
</div>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME STATE ---
let gameState = 'MENU';
let score = 0;
let frames = 0;
let lives = 3;
let bombs = 3;
let shake = 0;

const player = {
    x: 225, y: 500, size: 3, speed: 5,
    bullets: [], invuln: 0,
    lastShot: 0
};

const boss = {
    x: 225, y: 120, hp: 2000, maxHp: 2000,
    active: true, targetX: 225, moveTimer: 0
};

let enemyBullets = [];
let particles = [];
const keys = {};

// --- INPUT ---
window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

function startGame() {
    score = 0; lives = 3; bombs = 3;
    boss.hp = boss.maxHp;
    enemyBullets = [];
    gameState = 'PLAYING';
    document.getElementById('overlay').classList.add('hidden');
}

function spawnBullet(x, y, angle, speed, color, radius = 4) {
    enemyBullets.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, color, r: radius });
}

function spawnParticle(x, y, color) {
    for(let i=0; i<5; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 20, color
        });
    }
}

// --- CORE LOOP ---
function update() {
    if (gameState !== 'PLAYING') return;
    frames++;
    if (shake > 0) shake--;
    if (player.invuln > 0) player.invuln--;

    // 1. Player Movement
    const moveSpeed = keys['shift'] ? player.speed / 2.5 : player.speed;
    if (keys['arrowup'] && player.y > 20) player.y -= moveSpeed;
    if (keys['arrowdown'] && player.y < 580) player.y += moveSpeed;
    if (keys['arrowleft'] && player.x > 20) player.x -= moveSpeed;
    if (keys['arrowright'] && player.x < 430) player.x += moveSpeed;

    // 2. Shooting & Bombing
    if (keys['z'] && frames > player.lastShot + 5) {
        player.bullets.push({ x: player.x - 8, y: player.y - 15 });
        player.bullets.push({ x: player.x + 8, y: player.y - 15 });
        player.lastShot = frames;
    }

    if (keys['x'] && bombs > 0 && player.invuln === 0) {
        bombs--;
        shake = 30;
        player.invuln = 120;
        enemyBullets = []; // Clear screen
        boss.hp -= 100;
        updateUI();
    }

    // 3. Boss AI & Patterns
    if (boss.active) {
        // Random Hover
        boss.moveTimer--;
        if (boss.moveTimer <= 0) {
            boss.targetX = 100 + Math.random() * 250;
            boss.moveTimer = 60 + Math.random() * 100;
        }
        boss.x += (boss.targetX - boss.x) * 0.05;

        // Attack Patterns
        if (boss.hp > 1000) {
            // Pattern: Spiral Fan
            if (frames % 4 === 0) {
                let angle = (frames * 0.1);
                spawnBullet(boss.x, boss.y, angle, 3, "#00f0ff");
                spawnBullet(boss.x, boss.y, -angle, 3, "#00f0ff");
            }
        } else {
            // Pattern: Panic Hex
            if (frames % 20 === 0) {
                for(let i=0; i<12; i++) {
                    spawnBullet(boss.x, boss.y, (i * Math.PI * 2 / 12) + (frames*0.01), 2.5, "#ff0055", 6);
                }
            }
        }
    }

    // 4. Bullet Physics & Collision
    player.bullets.forEach((pb, i) => {
        pb.y -= 12;
        if (Math.hypot(pb.x - boss.x, pb.y - boss.y) < 40) {
            boss.hp -= 2;
            spawnParticle(pb.x, pb.y, "yellow");
            player.bullets.splice(i, 1);
            score += 100;
        }
        if (pb.y < 0) player.bullets.splice(i, 1);
    });

    enemyBullets.forEach((eb, i) => {
        eb.x += eb.vx; eb.y += eb.vy;

        // Hitbox Collision
        if (player.invuln <= 0 && Math.hypot(eb.x - player.x, eb.y - player.y) < player.size + eb.r/2) {
            lives--;
            player.invuln = 100;
            shake = 20;
            enemyBullets = [];
            if (lives < 0) endGame("GAME OVER");
            updateUI();
        }

        if (eb.y > 600 || eb.y < 0 || eb.x < 0 || eb.x > 450) enemyBullets.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });

    if (boss.hp <= 0) endGame("VICTORY!");
    updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = score.toLocaleString().padStart(9, '0');
    document.getElementById('lives').innerText = "♥".repeat(Math.max(0, lives));
    document.getElementById('bombs').innerText = "★".repeat(bombs);
    document.getElementById('hp-inner').style.width = (boss.hp / boss.maxHp * 100) + "%";
}

function endGame(text) {
    gameState = 'MENU';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('msg-title').innerText = text;
    document.getElementById('msg-sub').innerText = "Final Score: " + score;
}

function draw() {
    ctx.save();
    if (shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Boss
    let grad = ctx.createRadialGradient(boss.x, boss.y, 10, boss.x, boss.y, 40);
    grad.addColorStop(0, "white");
    grad.addColorStop(1, boss.hp > 1000 ? "cyan" : "red");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(boss.x, boss.y, 30, 0, Math.PI*2); ctx.fill();

    // Draw Player
    if (player.invuln % 4 < 2) {
        ctx.fillStyle = "white";
        ctx.fillRect(player.x - 15, player.y - 10, 30, 20);
        // Hitbox dot
        if (keys['shift']) {
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(player.x, player.y, 4, 0, Math.PI*2); ctx.fill();
        }
    }

    // Draw Bullets
    ctx.fillStyle = "#fff";
    player.bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 15));

    enemyBullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.stroke();
    });

    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2, 2);
    });

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
