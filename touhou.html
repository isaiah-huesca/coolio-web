<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Danmaku: Scarlet Incident</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #wrapper { position: relative; border: 4px solid #444; }
        canvas { background: #000510; display: block; }
        #sidebar { position: absolute; right: -210px; top: 0; width: 200px; height: 100%; background: #1a1a1a; padding: 10px; border: 2px solid #333; box-sizing: border-box; }
        .label { color: #888; font-size: 12px; margin-top: 10px; }
        .val { font-size: 20px; color: #e0e0e0; font-weight: bold; }
        #hp-bar { width: 100%; height: 6px; background: #300; margin-top: 5px; border: 1px solid #600; display: none; }
        #hp-fill { height: 100%; background: #f00; width: 100%; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        button { padding: 10px 20px; background: #900; color: #fff; border: none; cursor: pointer; font-family: inherit; font-size: 18px; margin-top: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="wrapper">
    <canvas id="gameCanvas" width="450" height="600"></canvas>
    <div id="sidebar">
        <div class="label">HIGH SCORE</div>
        <div class="val">000050000</div>
        <div class="label">SCORE</div>
        <div id="score" class="val">0</div>
        <div class="label">PLAYER</div>
        <div id="lives" class="val" style="color:#ff69b4">♥♥♥</div>
        <div class="label">POWER</div>
        <div id="power" class="val" style="color:#ff4444">0.00 / 20.00</div>
        <div id="boss-ui">
            <div class="label">ENEMY HP</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
        </div>
    </div>
    <div id="overlay">
        <h1 id="title">SCARLET INCIDENT</h1>
        <p>Z: Shoot | X: Bomb | Shift: Focus<br>Arrow Keys: Move</p>
        <button id="start-btn">START STAGE</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME CONFIG & STATE ---
let state = 'MENU';
let frames = 0;
let score = 0;
let lives = 3;
let power = 0;
let bombs = 3;
let shake = 0;

const player = { x: 225, y: 500, size: 2, speed: 4.5, invuln: 0, bullets: [] };
const enemies = [];
const enemyBullets = [];
const items = [];
const particles = [];
const boss = { active: false, x: 225, y: -100, hp: 3000, maxHp: 3000, moveT: 0 };

const keys = {};
window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

// --- HELPERS ---
function spawnBullet(x, y, angle, speed, color, r=3) {
    enemyBullets.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, color, r });
}

function spawnItem(x, y, type) {
    items.push({ x, y, type, vy: 1.5 });
}

// --- LEVEL DIRECTOR ---
function runLevelLogic() {
    // Spawn Mobs
    if (frames < 1200) {
        if (frames % 60 === 0) {
            enemies.push({ x: Math.random() * 400 + 25, y: -20, hp: 10, type: 'mob' });
        }
    }
    // Transition to Boss
    else if (frames === 1500) {
        boss.active = true;
        document.getElementById('hp-bar').style.display = 'block';
    }
}

// --- UPDATE LOOP ---
function update() {
    if (state !== 'PLAYING') return;
    frames++;
    if (shake > 0) shake--;
    if (player.invuln > 0) player.invuln--;

    runLevelLogic();

    // 1. Player Movement
    const spd = keys['shift'] ? player.speed / 2.2 : player.speed;
    if (keys['arrowup'] && player.y > 20) player.y -= spd;
    if (keys['arrowdown'] && player.y < 580) player.y += spd;
    if (keys['arrowleft'] && player.x > 20) player.x -= spd;
    if (keys['arrowright'] && player.x < 430) player.x += spd;

    // 2. Player Shooting
    if (keys['z'] && frames % 5 === 0) {
        player.bullets.push({ x: player.x, y: player.y - 10 });
        if (power >= 10) {
            player.bullets.push({ x: player.x - 12, y: player.y });
            player.bullets.push({ x: player.x + 12, y: player.y });
        }
        if (power >= 20) {
            player.bullets.push({ x: player.x - 20, y: player.y + 5, vx: -1 });
            player.bullets.push({ x: player.x + 20, y: player.y + 5, vx: 1 });
        }
    }

    // 3. Enemy Logic
    enemies.forEach((en, i) => {
        en.y += 1.5;
        if (frames % 80 === 0) spawnBullet(en.x, en.y, Math.PI/2, 2.5, '#f0f');
        if (en.y > 620) enemies.splice(i, 1);

        // Player bullet vs Enemy
        player.bullets.forEach((pb, pi) => {
            if (Math.hypot(pb.x - en.x, pb.y - en.y) < 20) {
                en.hp -= 5;
                player.bullets.splice(pi, 1);
                if (en.hp <= 0) {
                    spawnItem(en.x, en.y, Math.random() > 0.5 ? 'P' : 'V');
                    enemies.splice(i, 1);
                    score += 500;
                }
            }
        });
    });

    // 4. Boss Logic
    if (boss.active) {
        if (boss.y < 120) boss.y += 2;
        else {
            boss.moveT++;
            boss.x += Math.sin(boss.moveT * 0.02) * 2;

            // Patterns
            if (frames % 4 === 0) {
                let a = frames * 0.15;
                spawnBullet(boss.x, boss.y, a, 3, '#0ff');
                spawnBullet(boss.x, boss.y, a + Math.PI, 3, '#0ff');
            }
            if (frames % 100 === 0) {
                for(let i=0; i<16; i++) spawnBullet(boss.x, boss.y, i*Math.PI*2/16, 1.5, '#fff', 6);
            }
        }

        player.bullets.forEach((pb, pi) => {
            if (Math.hypot(pb.x - boss.x, pb.y - boss.y) < 40) {
                boss.hp -= 2;
                player.bullets.splice(pi, 1);
                score += 100;
            }
        });
        if (boss.hp <= 0) endGame("STORY CLEAR!");
    }

    // 5. Bullets & Items
    player.bullets.forEach((b, i) => {
        b.y -= 10;
        if (b.vx) b.x += b.vx;
        if (b.y < -20) player.bullets.splice(i, 1);
    });

    enemyBullets.forEach((eb, i) => {
        eb.x += eb.vx; eb.y += eb.vy;
        if (player.invuln <= 0 && Math.hypot(eb.x - player.x, eb.y - player.y) < player.size + eb.r/2) {
            lives--; player.invuln = 100; shake = 15;
            if (lives < 0) endGame("GAME OVER");
        }
        if (eb.y > 610 || eb.y < -10 || eb.x < -10 || eb.x > 460) enemyBullets.splice(i, 1);
    });

    items.forEach((it, i) => {
        it.y += it.vy;
        if (Math.hypot(it.x - player.x, it.y - player.y) < 30) {
            if (it.type === 'P') power = Math.min(20, power + 1);
            else score += 1000;
            items.splice(i, 1);
        }
        if (it.y > 610) items.splice(i, 1);
    });

    updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = score.toLocaleString();
    document.getElementById('lives').innerText = "♥".repeat(Math.max(0, lives));
    document.getElementById('power').innerText = power.toFixed(2) + " / 20.00";
    document.getElementById('hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
}

function endGame(msg) {
    state = 'MENU';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('title').innerText = msg;
}

function draw() {
    ctx.save();
    if (shake > 0) ctx.translate(Math.random()*4-2, Math.random()*4-2);
    ctx.clearRect(0, 0, 450, 600);

    // Draw Boss
    if (boss.active) {
        ctx.fillStyle = '#400'; ctx.beginPath();
        ctx.arc(boss.x, boss.y, 40, 0, Math.PI*2); ctx.fill();
    }

    // Draw Items
    items.forEach(it => {
        ctx.fillStyle = it.type === 'P' ? '#f44' : '#44f';
        ctx.fillRect(it.x-8, it.y-8, 16, 16);
        ctx.fillStyle = '#fff'; ctx.fillText(it.type, it.x-3, it.y+4);
    });

    // Draw Player
    if (player.invuln % 4 < 2) {
        ctx.fillStyle = '#fff'; ctx.fillRect(player.x-10, player.y-15, 20, 30);
        if (keys['shift']) {
            ctx.fillStyle = 'red'; ctx.beginPath();
            ctx.arc(player.x, player.y, 4, 0, Math.PI*2); ctx.fill();
        }
    }

    // Draw Bullets
    ctx.fillStyle = '#fff';
    player.bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 12));
    enemyBullets.forEach(b => {
        ctx.fillStyle = b.color; ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    });

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

document.getElementById('start-btn').onclick = () => {
    score = 0; lives = 3; power = 5; frames = 0;
    enemies.length = 0; enemyBullets.length = 0; items.length = 0;
    boss.active = false; boss.y = -100; boss.hp = 3000;
    state = 'PLAYING';
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('hp-bar').style.display = 'none';
};

draw();
</script>
</body>
</html>
